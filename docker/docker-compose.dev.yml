services:
  farmclaw:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "18789:18789"
    environment:
      - OPENCLAW_CONFIG=${OPENCLAW_CONFIG}
      - SOUL_MD=${SOUL_MD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - farmclaw-data:/home/node/.openclaw/memory
      - farmclaw-vault:/home/node/.openclaw/vault
      - farmclaw-workspace:/home/node/workspace

volumes:
  farmclaw-data:
  farmclaw-vault:
  farmclaw-workspace:
